version: 2

project_name: usb-soundcard-mapper

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: usb-soundcard-mapper
    main: .
    binary: usb-soundcard-mapper
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ldflags:
      - -s -w -X main.AppVersion={{.Version}}
    env:
      - CGO_ENABLED=0

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: tomtom215
    name: go-usb-audio-mapper
  draft: false
  prerelease: auto
